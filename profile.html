<!DOCTYPE html>
<html>
	<head>
		<title> javascript</title>
		<script>
			let quantity = 0;

		</script>
	</head>
	<body>
		<h2> cart quantity</h2><br>
		<button onclick="
	console.log(`quantity: ${quantity}`)
		">show quantity</button>
		<button onclick="
		quantity = quantity + 1;
		console.log(`quantity: ${quantity}`)
		">add to cart</button>
		<button onclick="
		quantity = quantity + 2;
		console.log(`quantity: ${quantity}`)
		"> +2</button>
		<button onclick="
		quantity = quantity + 3;
		console.log(`quantity: ${quantity}`)
		"> +3</button>
		<button onclick="
		quantity = 0;
		console.log('cart reserted')"> resert</button>
	</body>
</html>
